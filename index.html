<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Hub – Legal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 56px 48px; max-width: 440px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.07); text-align: center; }
    .bar { width: 40px; height: 4px; background: linear-gradient(90deg, #2563eb, #f97316); border-radius: 2px; margin: 0 auto 32px; }
    h1 { font-size: 26px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; margin-bottom: 6px; }
    .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 48px; }
    .link { display: block; padding: 15px 24px; border-radius: 10px; text-decoration: none; font-size: 14px; font-weight: 600; letter-spacing: 0.1px; margin-bottom: 12px; border: 1.5px solid #e5e7eb; color: #0f172a; transition: border-color 0.2s, color 0.2s; }
    .link:hover { border-color: #2563eb; color: #2563eb; }
    .footer { margin-top: 48px; color: #9ca3af; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="bar"></div>
    <h1>Sports Hub</h1>
    <p class="subtitle">Legal Documents</p>
    <a class="link" href="terms.html">Terms of Service</a>
    <a class="link" href="privacy.html">Privacy Policy</a>
    <p class="footer">© 2025 Sports Hub. All rights reserved.</p>
  </div>
</body>
</html>
